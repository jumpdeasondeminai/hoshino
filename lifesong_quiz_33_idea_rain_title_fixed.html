  <style>

  <script>
    const languages = [{ key: "zh", label: "中文", code: "ZH" }, { key: "ja", label: "日本語", code: "JP" }, { key: "en", label: "English", code: "EN" }];
    const ui = {"zh": {"headerTitle": "人生の一曲診断", "reset": "回到开头", "changeLanguage": "切换语言", "chooseLanguageTitle": "请选择测试语言", "startTitle": "你的人生之歌是哪一首？", "startButton": "开始测试", "resultEyebrow": "YOUR LIFE SONG", "copyResult": "复制结果", "copied": "已复制", "again": "再测一次", "sharePrefix": "我的人生一曲是", "shareTag": "#人生の一曲测试 #星野源 #SAKEROCK", "yes": "是", "no": "否", "prev": "返回上一题", "maybeYes": "也许是", "maybeNo": "也许否", "qrTitle": "扫码进入测试", "qrCopy": "分享截图时，朋友也可以直接扫码测自己的人生一曲"}, "ja": {"headerTitle": "人生の一曲診断", "reset": "最初へ", "changeLanguage": "言語を変える", "chooseLanguageTitle": "診断する言語を選んでください", "startTitle": "あなたの人生の一曲は？", "startButton": "診断をはじめる", "resultEyebrow": "YOUR LIFE SONG", "copyResult": "結果をコピー", "copied": "コピーしました", "again": "もう一度診断する", "sharePrefix": "私の人生の一曲は", "shareTag": "#人生の一曲診断 #星野源 #SAKEROCK", "yes": "はい", "no": "いいえ", "prev": "前の質問へ", "maybeYes": "ややはい", "maybeNo": "ややいいえ", "qrTitle": "QRコードから診断へ", "qrCopy": "結果画像をシェアすれば、友達もそのまま診断できます"}, "en": {"headerTitle": "Life Song Quiz", "reset": "Back to start", "changeLanguage": "Change language", "chooseLanguageTitle": "Choose your quiz language", "startTitle": "Which is the song of your life?", "startButton": "Start quiz", "resultEyebrow": "YOUR LIFE SONG", "copyResult": "Copy result", "copied": "Copied", "again": "Try again", "sharePrefix": "My life song is", "shareTag": "#LifeSongQuiz #GenHoshino #SAKEROCK", "yes": "Yes", "no": "No", "prev": "Previous question", "maybeYes": "Probably yes", "maybeNo": "Probably no", "qrTitle": "Scan to take the quiz", "qrCopy": "Share this result so others can scan and find their life song too"}};
    const results = [{"id": "continues", "artist": "星野源", "song": "Continues", "scores": {"life": 5, "forward": 5, "solitude": 2, "humor": 2, "body": 2, "light": 4, "chaos": 2, "memory": 2, "intimacy": 3, "rebuild": 4}, "zh": ["让日子继续的人", "你不是因为一切都变好了才继续，而是在还看不清前方的时候，也能把今天往前推一点。你认真投入过的事，会变成下一步的光。", ["继续", "日常", "下一步的光"]], "ja": ["日々を続けていく人", "すべてが良くなったから続けるのではなく、まだ先が見えない中でも、今日を少し前へ進めていける人。あなたが本気で燃やした想いは、次の一歩を照らしてくれる。", ["続く", "日々", "次の一歩"]], "en": ["The one who carries the days forward", "You do not keep going because everything has become better. Even when the road ahead is unclear, you can still move today forward a little. What you have poured yourself into becomes the light for your next step.", ["continuing", "everyday life", "next step"]]}, {"id": "uchi-de-odorou", "song": "うちで踊ろう", "artist": "星野源", "scores": {"life": 4, "forward": 2, "solitude": 5, "humor": 1, "body": 2, "light": 3, "chaos": 1, "memory": 2, "intimacy": 5, "rebuild": 2}, "zh": ["独处也有回声的人", "你不一定需要热闹的现场，才能感觉自己和世界相连。独处时，你也会用歌、节奏、消息和想象，把房间变成有回声的地方。那些没有见面的时间，并不是断开，而是各自在生活里，听见同一段旋律。", ["独处", "回声", "同一段旋律"]], "ja": ["ひとりに響きを持つ人", "賑やかな場所にいなくても、世界とつながっている感覚を持てる人。ひとりでいる時間にも、歌やリズムや言葉や想像で、部屋に響きを生み出していける。会えない時間は断絶ではなく、それぞれの生活の中で同じ旋律を聴いている時間。", ["ひとり", "響き", "同じ旋律"]], "en": ["The one whose solitude has an echo", "You do not need to be in a crowded place to feel connected to the world. Even when you are alone, songs, rhythm, messages, and imagination can turn a room into a place with an echo. Time apart is not disconnection; it is hearing the same melody from within separate lives.", ["solitude", "echo", "same melody"]]}, {"id": "kigeki", "artist": "星野源", "song": "喜劇", "scores": {"life": 5, "forward": 3, "solitude": 2, "humor": 4, "body": 1, "light": 4, "chaos": 2, "memory": 2, "intimacy": 5, "rebuild": 4}, "zh": ["把归处亲手搭起来的人", "你不太相信现成的幸福模板，也不等谁把你安放好。你会在吵闹、笑声、饭桌和琐碎日常里，一点点搭出能回去的地方。对你来说，归属不是天生拥有，而是和选择的人一起过出来的。", ["归处", "选择的关系", "日常喜剧"]], "ja": ["帰る場所を作っていく人", "決まった幸せの形を、そのまま信じる人ではない。誰かに居場所を用意されるのを待つより、言い合いも笑いも食卓も含めて、少しずつ帰る場所を作っていく人。居場所は与えられるものではなく、選んだ人と暮らしながら育てるもの。", ["帰る場所", "選ぶ関係", "日常の喜劇"]], "en": ["The one who builds a place to return to", "You do not simply believe in ready-made happiness, and you do not wait for someone to place you somewhere. Through noise, laughter, meals, and small routines, you slowly build a place to return to. Belonging is not something you are handed; it is something you live into with the people you choose.", ["belonging", "chosen bonds", "daily comedy"]]}, {"id": "idea", "artist": "星野源", "song": "アイデア", "scores": {"life": 5, "forward": 5, "solitude": 2, "humor": 3, "body": 3, "light": 5, "chaos": 2, "memory": 1, "intimacy": 2, "rebuild": 5}, "zh": ["把雨声听成歌的人", "你不是只靠运气等灵感降临的人。下雨的日子里，滴答声、湿掉的街道、灰色的天空，还有心里一点说不清的低落，都会被你听成另一种节拍。你会让雨声替你开口，让原本沉下去的心情，慢慢变成可以继续唱下去的歌。", ["雨天", "灵感", "新的旋律"]], "ja": ["雨音を歌に変える人", "ただ運よくひらめきが降ってくるのを待つ人ではない。雨の日の滴る音、濡れた街、灰色の空、胸の中にある少し説明しにくい沈みまで、別のリズムとして聴き取れる。雨音に自分の代わりに声を出してもらい、沈んでいた気持ちを、また歌い続けられる歌に変えていく。", ["雨の日", "ひらめき", "新しい旋律"]], "en": ["The one who turns rain into song", "You do not just wait for inspiration to arrive by luck. On rainy days, the dripping sound, wet streets, gray sky, and the low feeling you cannot quite explain can all become another rhythm to you. You let the rain speak for you, slowly turning a sunken mood into a song that can keep going.", ["rainy day", "inspiration", "new melody"]]}, {"id": "bakemono", "artist": "星野源", "song": "化物", "scores": {"life": 4, "forward": 4, "solitude": 4, "humor": 2, "body": 4, "light": 2, "chaos": 4, "memory": 3, "intimacy": 2, "rebuild": 4}, "zh": ["把孤独变成气场的人", "你不是没有脆弱，只是不愿把它摆成可怜的样子。越是被期待、被看见，越知道热闹背后也会有很深的孤独。你会把那些不安、野心和不够体面的部分一起带上，让它们变成自己身上的气场。", ["孤独", "气场", "不完美"]], "ja": ["孤独を気配に変える人", "あなたは弱さがない人ではない。ただ、それをかわいそうな形で見せたいわけではない。期待され、見られるほど、賑やかさの裏に深い孤独があることも知っている。その不安も野心も整わない部分も抱えたまま、自分だけの気配に変えていく人。", ["孤独", "気配", "不完全"]], "en": ["The one who turns loneliness into presence", "It is not that you have no weakness; you simply do not want to display it as something pitiful. The more you are expected to shine, the more you know how deep loneliness can sit behind noise. You carry anxiety, ambition, and the imperfect parts of yourself, turning them into your own presence.", ["loneliness", "presence", "imperfection"]]}, {"id": "sun", "artist": "星野源", "song": "SUN", "scores": {"life": 4, "forward": 4, "solitude": 2, "humor": 3, "body": 5, "light": 5, "chaos": 2, "memory": 1, "intimacy": 3, "rebuild": 3}, "zh": ["被生命力拉起来的人", "你不是天生乐观，也不是只喜欢明亮的东西。你只是知道，人快要被夜色压住的时候，身体、歌声和一点没来由的生命力，真的能把人往外拉。你的光不是没有阴影，而是阴影里还会响起声音。", ["夜色", "太阳", "生命力"]], "ja": ["生命力に引き上げられる人", "生まれつき楽観的な人でも、明るいものだけが好きな人でもない。ただ、夜に押しつぶされそうなとき、身体や歌声や理由のない生命力が、本当に人を外へ連れ出すことを知っている。あなたの光は影がないことではなく、影の中でも声が鳴ること。", ["夜", "太陽", "生命力"]], "en": ["The one lifted by life force", "You are not naturally optimistic, and you do not only love bright things. You simply know that when the night almost crushes you, the body, a voice, and a reasonless life force can truly pull someone outside. Your light is not the absence of shadow; it is a sound that still rings inside it.", ["night", "sun", "life force"]]}, {"id": "weekend", "artist": "星野源", "song": "Week End", "scores": {"life": 3, "forward": 4, "solitude": 1, "humor": 4, "body": 5, "light": 5, "chaos": 2, "memory": 1, "intimacy": 3, "rebuild": 3}, "zh": ["把未来跳到眼前的人", "你对“结束”没有那么悲观。一个星期走到尽头、一次聚会散场、某个阶段说再见，对你来说都可能是新的入口。你会让身体先高兴起来，像在耳机里给自己开一场很小的派对。", ["告别", "开始", "小派对"]], "ja": ["未来を今踊る人", "あなたは「終わり」をそこまで悲観していない。一週間の終わり、集まりのあと、ある時期へのさよならは、次の入口にもなる。身体を先に楽しくして、イヤホンの中で小さなパーティーを始められる人。", ["さよなら", "始まり", "小さなパーティー"]], "en": ["The one who dances the future into now", "You are not too pessimistic about endings. The end of a week, the end of a gathering, or saying goodbye to a phase can become a new entrance for you. You let the body become happy first, as if starting a small party inside your headphones.", ["goodbye", "beginning", "small party"]]}, {"id": "friend-ship", "artist": "星野源", "song": "Friend Ship", "scores": {"life": 4, "forward": 4, "solitude": 4, "humor": 1, "body": 3, "light": 4, "chaos": 1, "memory": 4, "intimacy": 4, "rebuild": 3}, "zh": ["把离别也留得明亮的人", "你知道有些人可能不会一直同行，但这不代表那段关系不重要。友情也好，爱情也好，很多感情本来就很难说清。你会把分别时的酸楚和曾经一起走过的时间都收好，让它们变成一种明亮的牵挂。", ["离别", "友情与爱情", "明亮的牵挂"]], "ja": ["別れも明るく残せる人", "ずっと一緒に歩けない相手でも、大切だったことまで消えるわけではないと知っている人。友情でも愛情でも、言葉にしきれない感情はある。別れの切なさも、一緒に過ごした時間も抱えたまま、明るい余韻として残していける。", ["別れ", "友情と愛情", "明るい余韻"]], "en": ["The one who leaves partings bright", "You know that not being able to walk with someone forever does not erase how important they were. Whether it is friendship or love, some feelings cannot be neatly named. You keep both the ache of parting and the time you once shared, letting them remain as a bright afterglow.", ["parting", "friendship and love", "bright afterglow"]]}, {"id": "family-song", "artist": "星野源", "song": "Family Song", "scores": {"life": 5, "forward": 2, "solitude": 2, "humor": 3, "body": 1, "light": 4, "chaos": 1, "memory": 3, "intimacy": 5, "rebuild": 3}, "zh": ["把普通重新定义的人", "你不太在意别人规定的“正常”是什么样，更在意日常里有没有被照顾、被等待、被记得。对你来说，家不是格式，而是有人愿意把饭、问候、沉默和明天一起接住。", ["普通", "照顾", "家的形状"]], "ja": ["普通を定義し直す人", "誰かが決めた「普通」の形より、日々の中で気にかけ合えるかを大事にする人。家とは形式ではなく、食事や挨拶や沈黙や明日を、一緒に受け止めようとすること。", ["普通", "ケア", "家の形"]], "en": ["The one who redefines the ordinary", "You care less about what “normal” is supposed to look like and more about whether daily life holds care, waiting, and being remembered. Home is not a format; it is someone willing to hold meals, greetings, silence, and tomorrow with you.", ["ordinary", "care", "shape of home"]]}, {"id": "koi", "artist": "星野源", "song": "恋", "scores": {"life": 3, "forward": 3, "solitude": 1, "humor": 5, "body": 4, "light": 5, "chaos": 1, "memory": 1, "intimacy": 5, "rebuild": 2}, "zh": ["让相处跳起舞的人", "你喜欢关系里轻快、好笑、能一起行动的部分。感情不一定要被说得很重；有人一起笑、一起回到街上，生活就会忽然有了节拍。", ["恋", "节拍", "一起行动"]], "ja": ["関係を踊らせる人", "関係の中にある軽さ、笑える瞬間、一緒に動ける感じが好きな人。感情を重く語りすぎなくても、誰かと笑い、街へ戻るだけで、生活にはふとリズムが生まれる。", ["恋", "リズム", "一緒に動く"]], "en": ["The one who makes connection dance", "You like the light, funny, active parts of connection. Feelings do not always need to be spoken heavily; laughing with someone and returning to the street can suddenly give daily life a rhythm.", ["love", "rhythm", "doing together"]]}, {"id": "sakura-no-mori", "artist": "星野源", "song": "桜の森", "scores": {"life": 2, "forward": 3, "solitude": 2, "humor": 3, "body": 5, "light": 4, "chaos": 4, "memory": 2, "intimacy": 3, "rebuild": 2}, "zh": ["在花影里发热的人", "你不一定喜欢规规矩矩的明亮，更容易被漂亮里带一点危险、热闹里带一点妖气的东西吸引。对你来说，快乐不只是放松，也可以是夜色、花影、身体和心跳一起变得不安分。", ["花影", "妖气", "身体反应"]], "ja": ["花影の中で熱を帯びる人", "きちんとした明るさより、美しさの中に少し危うさがあり、賑やかさの中に少し妖しさがあるものに惹かれやすい人。あなたにとって楽しさはただ安心することではなく、夜や花影や身体や鼓動が、少し落ち着かなくなることでもある。", ["花影", "妖しさ", "身体反応"]], "en": ["The one who warms up under flower shadows", "You are less drawn to neat brightness than to beauty with a little danger in it, and joy with a slightly uncanny edge. For you, pleasure is not only relaxation; it is night air, flower shadows, the body, and the heartbeat becoming a little restless together.", ["flower shadow", "uncanny edge", "body response"]]}, {"id": "crazy-crazy", "artist": "星野源", "song": "Crazy Crazy", "scores": {"life": 2, "forward": 3, "solitude": 3, "humor": 5, "body": 4, "light": 3, "chaos": 5, "memory": 2, "intimacy": 2, "rebuild": 2}, "zh": ["漂亮地偏离轨道的人", "你不想每件事都按标准答案来。计划跑偏、话题变怪、临时起意时，你反而更容易进入状态。你需要一点偏差，生活才不会只剩下正确。", ["偏离", "即兴", "有趣"]], "ja": ["きれいにズレていく人", "すべてを正解通りに進めたいわけではない人。予定がズレる、話が変な方向へ行く、急に思いつく。そういう偏差があるほうが、あなたは調子が出やすい。少しズレているから、生活は正しさだけで終わらない。", ["ズレ", "即興", "面白さ"]], "en": ["The one who beautifully goes off track", "You do not need everything to follow the standard answer. A plan going sideways, a strange conversation, or a sudden idea can put you in your element. You need a little deviation so life does not become only correct.", ["off track", "improvisation", "interest"]]}, {"id": "film", "artist": "星野源", "song": "フィルム", "scores": {"life": 4, "forward": 3, "solitude": 4, "humor": 1, "body": 1, "light": 3, "chaos": 2, "memory": 5, "intimacy": 2, "rebuild": 4}, "zh": ["把过去重新剪亮的人", "你不会把经历过的暗处直接删掉。痛苦、误会、错过的画面，都还留在你的胶片里；但你不是被它们困住，而是在一次次回看里，重新决定它们在你人生里的位置。", ["胶片", "回看", "重新剪辑"]], "ja": ["過去をもう一度編集する人", "あなたは通ってきた暗い場所を、簡単に削除しない人。痛みも誤解も、逃した場面も、自分のフィルムの中に残っている。それでも閉じ込められているのではなく、何度も見返しながら、それらの置き場所を決め直していく。", ["フィルム", "見返す", "再編集"]], "en": ["The one who re-edits the past into light", "You do not simply delete the dark places you have passed through. Pain, misunderstanding, and missed scenes remain on your film; but you are not trapped by them. By replaying them, you keep deciding where they belong in your life.", ["film", "replay", "re-editing"]]}, {"id": "shiranai", "artist": "星野源", "song": "知らない", "scores": {"life": 4, "forward": 2, "solitude": 5, "humor": 1, "body": 1, "light": 2, "chaos": 2, "memory": 5, "intimacy": 1, "rebuild": 2}, "zh": ["能先不下结论的人", "遇到说不清的事，你不会急着找一个漂亮解释。失去、沉默、没答案的部分，你会先让它们留在原处。你相信有些事不是现在不懂就没有意义，而是要等时间把轮廓慢慢显出来。", ["不知道", "保留问题", "时间"]], "ja": ["すぐ結論を出さない人", "うまく説明できないことに、急いできれいな答えを出さない人。失ったもの、沈黙、答えのない部分を、まずそのまま置いておける。今わからないから意味がないのではなく、時間の中で輪郭が見えてくることを知っている。", ["知らない", "保留", "時間"]], "en": ["The one who can wait before deciding", "When something cannot be explained clearly, you do not rush to find a neat answer. Loss, silence, and unanswered parts can stay where they are. You know that not understanding something now does not make it meaningless; time may slowly reveal its shape.", ["unknown", "holding the question", "time"]]}, {"id": "kudaranai", "artist": "星野源", "song": "くだらないの中に", "scores": {"life": 5, "forward": 1, "solitude": 3, "humor": 3, "body": 1, "light": 3, "chaos": 1, "memory": 3, "intimacy": 5, "rebuild": 1}, "zh": ["在无聊里确认爱的人", "你不太相信太漂亮的告白。真正让你心软的，往往是那些很小、很笨、甚至有点没意义的瞬间：一句玩笑、一个气味、一次普通得不能再普通的相处。对你来说，爱不是脱离生活，而是藏在生活最不体面的地方。", ["无聊", "小事", "生活里的爱"]], "ja": ["くだらなさの中で愛を確かめる人", "あなたはきれいすぎる告白を、そこまで信じていない人。本当に心がやわらかくなるのは、小さくて、少しばかばかしくて、意味がないような瞬間。冗談、匂い、何でもない時間。あなたにとって愛は生活から離れたものではなく、生活のいちばん格好つかない場所にある。", ["くだらなさ", "小さなこと", "生活の愛"]], "en": ["The one who finds love inside silly little things", "You do not fully trust confessions that are too beautiful. What softens you is often something small, foolish, and almost meaningless: a joke, a smell, an ordinary moment spent together. For you, love is not outside daily life; it hides in the least polished part of it.", ["silly things", "small moments", "love in daily life"]]}, {"id": "kuse-no-uta", "song": "くせのうた", "artist": "星野源", "scores": {"life": 4, "forward": 1, "solitude": 5, "humor": 1, "body": 1, "light": 2, "chaos": 1, "memory": 4, "intimacy": 5, "rebuild": 1}, "zh": ["想靠近真实的人", "你不是只想知道一个人明亮、好看的部分。越是在意，越会想听那些不太体面的小习惯、烦躁、沉默和夜里睡不着的事。对你来说，亲密不是迅速靠近，而是慢慢知道：原来我们相似，又原来全部不同。", ["癖", "细节", "慢慢知道"]], "ja": ["本当の君に近づく人", "あなたは誰かの明るく見せやすい部分だけを知りたいわけではない。大事に思うほど、癖や苛立ちや沈黙や、眠れなかった夜のことまで聞いてみたくなる。親密さとは急に近づくことではなく、似ているようで全部違うと、少しずつ知っていくこと。", ["癖", "細部", "少しずつ知る"]], "en": ["The one who moves closer to the real you", "You do not only want to know the bright, easy parts of someone. The more you care, the more you want to hear about their habits, irritation, silence, and sleepless nights. For you, intimacy is not rushing closer; it is slowly learning that two people may look alike, yet be different in every detail.", ["habits", "small details", "slow knowing"]]}, {"id": "barabara", "artist": "星野源", "song": "ばらばら", "scores": {"life": 4, "forward": 1, "solitude": 5, "humor": 1, "body": 1, "light": 2, "chaos": 2, "memory": 3, "intimacy": 4, "rebuild": 1}, "zh": ["需要各自空间的人", "你喜欢亲密，但不喜欢被关系吞掉。就算很在意对方，也需要自己的时间、节奏和边界。你相信分开站着不等于疏远，有时正因为不合成一个人，才更能好好相爱。", ["空间", "边界", "关系"]], "ja": ["それぞれの空間が必要な人", "親密さは好きだけれど、関係に飲み込まれたくはない人。相手を大事にしていても、自分の時間、自分のリズム、自分の境界が必要。別々に立つことは、遠ざかることではない。一つに溶け合わないからこそ、ちゃんと愛せることもある。", ["空間", "境界", "関係"]], "en": ["The one who needs separate space", "You value intimacy, but you do not want to be swallowed by a relationship. Even when you care deeply, you need your own time, rhythm, and boundaries. Standing apart does not mean moving away; sometimes not merging into one person is what makes love possible.", ["space", "boundaries", "relationship"]]}, {"id": "yume-no-sotoe", "artist": "星野源", "song": "夢の外へ", "scores": {"life": 4, "forward": 4, "solitude": 2, "humor": 2, "body": 3, "light": 4, "chaos": 1, "memory": 1, "intimacy": 2, "rebuild": 4}, "zh": ["把梦带到世界里的人", "你会做梦、会想象，也会把脑内的画面带到现实里。对你来说，走出梦不是失去浪漫，而是亲手让它碰到街道、日光和真实的人。", ["梦的外面", "现实", "亲手创造"]], "ja": ["夢を世界へ連れ出す人", "夢を見るし、想像もする。それを頭の中だけで終わらせず、現実へ連れ出せる人。夢の外へ出ることは、ロマンを失うことではなく、自分の手で街や光や誰かに触れさせること。", ["夢の外", "現実", "自分の手で作る"]], "en": ["The one who brings dreams into the world", "You dream and imagine, but you do not leave those images only inside your head. Stepping outside the dream does not mean losing romance; it means letting it touch streets, sunlight, and real people with your own hands.", ["outside the dream", "reality", "making it real"]]}, {"id": "jigoku", "artist": "星野源", "song": "地獄でなぜ悪い", "scores": {"life": 5, "forward": 5, "solitude": 3, "humor": 5, "body": 3, "light": 2, "chaos": 5, "memory": 4, "intimacy": 1, "rebuild": 5}, "zh": ["把痛苦也唱出声的人", "你不是把痛苦说得很漂亮的人。真的很糟的时候，安慰可能没有用，反而是喊出来、写下来、笑得难看一点，才像活着。你会带着悲伤的记忆往前走，不是因为地狱不坏，而是因为你不想把声音留给地狱。", ["地狱", "出声", "反骨"]], "ja": ["痛みまで声にする人", "あなたは苦しさをきれいに飾る人ではない。本当にひどいとき、慰めでは動けないこともある。叫ぶこと、書くこと、格好悪く笑うことのほうが、生きている感じに近い。悲しい記憶を抱えたまま進むのは、地獄が平気だからではなく、声まで地獄に渡したくないから。", ["地獄", "声", "反骨"]], "en": ["The one who gives pain a voice", "You are not someone who makes pain look beautiful. When things are truly awful, comfort may not work; shouting, writing it down, or laughing badly can feel closer to being alive. You move forward with sad memories not because hell is fine, but because you do not want hell to keep your voice too.", ["hell", "voice", "rebellion"]]}, {"id": "star", "artist": "星野源", "song": "Star", "scores": {"life": 5, "forward": 3, "solitude": 3, "humor": 1, "body": 1, "light": 5, "chaos": 2, "memory": 4, "intimacy": 2, "rebuild": 5}, "zh": ["把喜欢当作源头的人", "你不是只会望着远方等待光的人。你更像是已经经历过季节流转、结束和开始的人，知道影子也会创造美，知道生命曾经发亮，也知道要把“喜欢”重新握回自己手里。你的希望不是天真，而是从废墟、记忆和日常里重新长出来的东西。", ["喜欢", "源头", "重新发光"]], "ja": ["好きを源にする人", "あなたは遠くの光をただ待っているだけの人ではない。季節が巡り、終わりと始まりを通り抜けたあとで、影さえも美をつくること、いのちが確かに輝いたことを知っている人。あなたにとって希望とは、無邪気な明るさではなく、記憶や日々の中からもう一度、自分の「好き」を手にすること。", ["好き", "源", "もう一度輝く"]], "en": ["The one who makes love their source", "You are not simply waiting for a distant light. You are someone who has moved through changing seasons, endings, and beginnings, and still knows that even shadows can create beauty. Your hope is not naive brightness; it is something that grows again from memory, daily life, and the act of taking your own love back into your hands.", ["love", "source", "shine again"]]}, {"id": "pop-virus", "artist": "星野源", "song": "Pop Virus", "scores": {"life": 3, "forward": 4, "solitude": 2, "humor": 4, "body": 5, "light": 4, "chaos": 4, "memory": 1, "intimacy": 3, "rebuild": 3}, "zh": ["被 Pop 感染的人", "你不是单纯喜欢热闹，而是很容易被音乐里的节奏、空气和感染力带动。对你来说，真正厉害的 pop 不只是好听，而是会钻进生活、身体和情绪里，让你重新对世界产生反应。", ["Pop", "感染", "身体反应"]], "ja": ["ポップに感染する人", "あなたはただ賑やかなものが好きなだけではなく、音楽のリズムや空気、感染力に自然と動かされる人。あなたにとって本当に強いポップは、ただ聴きやすいだけではなく、生活や身体や感情に入り込み、世界への反応をもう一度呼び起こしてくれるもの。", ["ポップ", "感染", "身体反応"]], "en": ["The one who catches the pop virus", "You are not simply drawn to noise or excitement. You are easily moved by rhythm, atmosphere, and the infectious pull of music. For you, truly powerful pop is not just catchy; it gets into daily life, the body, and emotion, making you respond to the world all over again.", ["pop", "infection", "body response"]]}, {"id": "same-thing", "artist": "星野源", "song": "Same Thing", "scores": {"life": 2, "forward": 3, "solitude": 3, "humor": 5, "body": 3, "light": 2, "chaos": 5, "memory": 1, "intimacy": 2, "rebuild": 2}, "zh": ["需要把烦躁放出来的人", "你不想永远表现得礼貌、稳定、积极。重复和憋闷太多的时候，你需要一个安全出口，把不爽、反骨和厌倦直接放出来。那不是失控，而是给自己留一条通风口。", ["烦躁", "反骨", "出口"]], "ja": ["苛立ちを外へ出す人", "いつも礼儀正しく、安定して、前向きでいたいわけではない。繰り返しや息苦しさが多すぎるとき、苛立ちや反骨やうんざりを逃がす安全な出口が必要。それは壊れることではなく、自分に風を通すこと。", ["苛立ち", "反骨", "出口"]], "en": ["The one who needs to let frustration out", "You do not always want to appear polite, stable, and positive. When repetition and pressure pile up, you need a safe outlet for irritation, rebellion, and boredom. It is not losing control; it is leaving yourself a window for air.", ["frustration", "rebellion", "release"]]}, {"id": "fushigi", "artist": "星野源", "song": "不思議", "scores": {"life": 4, "forward": 3, "solitude": 3, "humor": 1, "body": 1, "light": 4, "chaos": 2, "memory": 3, "intimacy": 5, "rebuild": 3}, "zh": ["被没有理由的爱改变的人", "你不急着把感情解释清楚。明明彼此不同，明明说不出理由，却还是会被某个人改变日常、视线和选择。对你来说，爱最不可思议的地方不是答案，而是它真的让人有勇气继续走下去。", ["没有理由", "被改变", "继续走下去"]], "ja": ["理由のない愛に変えられる人", "あなたは感情を急いで説明しきろうとしない人。何もかも違う相手なのに、理由もなくそばにいたくなる。その不思議さが、日々の見え方や選び方を少しずつ変えていく。愛は答えではなく、孤独のそばで歩く勇気になるもの。", ["理由のない愛", "変化", "歩く勇気"]], "en": ["The one changed by love without a reason", "You do not rush to explain your feelings. Even when two people are different in every way, someone can still change your daily life, your gaze, and your choices for no clear reason. For you, the wonder of love is not that it gives an answer, but that it gives you the courage to keep walking beside loneliness.", ["love without reason", "change", "courage to walk"]]}, {"id": "souzo", "artist": "星野源", "song": "創造", "scores": {"life": 2, "forward": 4, "solitude": 1, "humor": 3, "body": 3, "light": 3, "chaos": 4, "memory": 1, "intimacy": 2, "rebuild": 5}, "zh": ["把世界玩出新路的人", "你不喜欢只按照现成规则通关。遇到不顺手的世界，你会想拆开、翻面、重排，再做出一条自己的路。创造对你来说不是高高在上的才华，而是把自己和别人之间架起桥的方法。", ["创造", "改规则", "架桥"]], "ja": ["世界に新しい遊び方を作る人", "あなたは用意されたルールをなぞってクリアするだけでは満足しない人。使いにくい世界に出会うと、ほどき、裏返し、並べ替え、自分の道を作りたくなる。創造は遠い才能ではなく、自分と誰かの間に橋をかける方法。", ["創造", "ルール変更", "橋をかける"]], "en": ["The one who finds a new way to play the world", "You are not satisfied with clearing a stage by following ready-made rules. When the world feels hard to use, you want to take it apart, turn it over, rearrange it, and make your own path. Creation is not a distant talent for you; it is a way to build a bridge between yourself and someone else.", ["creation", "changing rules", "building bridges"]]}, {"id": "cube", "artist": "星野源", "song": "Cube", "scores": {"life": 2, "forward": 4, "solitude": 4, "humor": 1, "body": 5, "light": 1, "chaos": 5, "memory": 2, "intimacy": 1, "rebuild": 4}, "zh": ["被困住也会找出口的人", "你知道有些规则不是为了让人好好活着，而是会把人推到越来越窄的地方。被恐惧和荒唐逼到墙边时，你不会只等别人来救。愤怒会让你清醒，直觉会让你行动，先让自己活着走出去。", ["封闭", "愤怒", "活着出去"]], "ja": ["閉じ込められても出口を探す人", "人を生かすためではなく、どんどん狭い場所へ追い込むためのルールがあることを知っている人。恐怖や理不尽に壁際まで追われたときも、誰かが助けに来るのを待つだけではない。怒りが意識を覚まし、直感が身体を動かす。まず生きて外へ出ようとする人。", ["閉鎖", "怒り", "生きて出る"]], "en": ["The one who looks for an exit even when trapped", "You know that some rules do not exist to help people live; they push people into smaller and smaller spaces. When fear and absurdity drive you against the wall, you do not only wait to be saved. Anger wakes you up, instinct makes you move, and your first task is to get out alive.", ["closed space", "anger", "getting out alive"]]}, {"id": "hikari-no-ato", "artist": "星野源", "song": "Why", "scores": {"life": 4, "forward": 4, "solitude": 4, "humor": 1, "body": 1, "light": 5, "chaos": 1, "memory": 5, "intimacy": 3, "rebuild": 4}, "zh": ["会带着旧光继续走的人", "你不觉得失去之后就必须立刻翻篇。重要的人和事留下的影响还在，你会带着它们继续生活。过去不是拖住你的东西，而是往前走时会反光的痕迹。", ["旧光", "记忆", "继续"]], "ja": ["残った光を連れて歩く人", "失ったあと、すぐに切り替えなければいけないとは思っていない人。大事な人や出来事が残した影響はまだある。それを連れて生活し、過去を前へ進むための光の跡にしていく。", ["残った光", "記憶", "続く"]], "en": ["The one who keeps walking with old light", "You do not think you have to move on immediately after loss. The influence of important people and events remains, and you carry it into daily life. The past does not only hold you back; it can reflect light as you move forward.", ["old light", "memory", "continuing"]]}, {"id": "eureka", "artist": "星野源", "song": "Eureka", "scores": {"life": 4, "forward": 4, "solitude": 3, "humor": 2, "body": 2, "light": 5, "chaos": 2, "memory": 3, "intimacy": 3, "rebuild": 5}, "zh": ["会慢慢想通的人", "你不一定当场就能消化一件事。过一阵子、换个环境、重新看一遍，你会突然明白自己其实已经走到这里了。那种迟来的明亮，对你很重要。", ["想通", "迟来的光", "重新出发"]], "ja": ["あとから腑に落ちる人", "その場ですぐに消化できるとは限らない人。時間が経つ、場所が変わる、もう一度見直す。そのあとで、実は自分がここまで来ていたことに気づく。遅れて差す光が、あなたには大事。", ["腑に落ちる", "遅れて差す光", "再出発"]], "en": ["The one who understands later", "You do not always process things on the spot. After time passes, the place changes, or you look again, you may realize that you have already made it this far. That late-arriving light matters to you.", ["realization", "late light", "restart"]]}, {"id": "aint-nobody-know", "artist": "星野源", "song": "Ain't Nobody Know", "scores": {"life": 2, "forward": 2, "solitude": 5, "humor": 1, "body": 3, "light": 2, "chaos": 3, "memory": 3, "intimacy": 5, "rebuild": 1}, "zh": ["有私密开关的人", "你不是所有情绪都愿意公开。越重要的感受，越可能只留给少数人、某个夜晚或某个不会被打扰的空间。对你来说，亲密有时不是被看见，而是不用解释。", ["私密", "夜晚", "不用解释"]], "ja": ["私的なスイッチを持つ人", "すべての感情を公開したいわけではない人。大事な気持ちほど、少数の人や、ある夜や、邪魔されない場所にだけ置いておきたくなる。あなたにとって親密さは、見せることではなく、説明しなくていいこと。", ["私密", "夜", "説明しない"]], "en": ["The one with a private switch", "You do not want every feeling to be public. The more important the emotion is, the more likely you are to keep it for a few people, a certain night, or a space that will not be interrupted. For you, intimacy is sometimes not being seen, but not needing to explain.", ["privacy", "night", "no explanation"]]}, {"id": "emerald-music", "artist": "SAKEROCK", "song": "Emerald Music", "scores": {"life": 2, "forward": 4, "solitude": 2, "humor": 3, "body": 5, "light": 4, "chaos": 2, "memory": 2, "intimacy": 1, "rebuild": 3}, "zh": ["不用歌词也能进入状态的人", "你不一定需要歌词解释情绪。节奏、音色、速度、乐器一进来，你就能知道这首歌适合走路、出门、坐车还是发呆。你的身体很懂音乐的天气。", ["器乐", "节奏", "状态切换"]], "ja": ["歌詞がなくても気分に入れる人", "感情を歌詞で説明されなくてもいい人。リズム、音色、速さ、楽器の入り方で、その曲が歩くためか、出かけるためか、移動するためか、ぼんやりするためかがわかる。身体が音楽の天気を知っている。", ["インスト", "リズム", "気分転換"]], "en": ["The one who can enter a mood without lyrics", "You do not always need lyrics to explain the emotion. Rhythm, tone, speed, and the way instruments enter tell you whether a song is for walking, going out, riding somewhere, or zoning out. Your body understands the weather of music.", ["instrumental", "rhythm", "mood shift"]]}, {"id": "company", "artist": "SAKEROCK", "song": "会社員", "scores": {"life": 3, "forward": 2, "solitude": 2, "humor": 5, "body": 3, "light": 3, "chaos": 4, "memory": 1, "intimacy": 1, "rebuild": 2}, "zh": ["会用幽默处理现实的人", "你知道上班、任务、规则都很烦，但不会一直正面硬扛。吐槽、装傻、轻轻偏一下，是你让现实没那么难吞的办法。你不是逃避现实，只是不给它摆出太严肃的脸。", ["现实", "吐槽", "脱力"]], "ja": ["ユーモアで現実を処理する人", "仕事やタスクやルールが面倒なことはわかっている。でも正面から抱え続けるだけではない。ツッコミ、とぼけること、少し斜めに見ることが、現実を飲み込みやすくする。現実から逃げるのではなく、現実に真面目すぎる顔をさせない人。", ["現実", "ツッコミ", "脱力"]], "en": ["The one who handles reality with humor", "You know work, tasks, and rules can be annoying, but you do not only face them head-on. Complaining, playing dumb, and looking at things sideways make reality easier to swallow. You are not escaping reality; you simply refuse to let it look too solemn.", ["reality", "complaint", "deadpan"]]}, {"id": "memories", "artist": "SAKEROCK", "song": "Memories", "scores": {"life": 3, "forward": 2, "solitude": 5, "humor": 2, "body": 2, "light": 3, "chaos": 1, "memory": 5, "intimacy": 2, "rebuild": 2}, "zh": ["把旧日子轻轻收好的人", "你不是沉迷怀旧，只是很容易被旧歌、旧城市和某个天气带回从前。那些记忆不一定沉重，也可能很轻，像春天路上的口哨声。你会把它们收好，不是为了停在过去，而是为了确认自己确实走过那里。", ["回忆", "旧日子", "轻轻收好"]], "ja": ["昔の日々をそっとしまう人", "ただ懐かしさに浸るだけの人ではない。昔の曲、街、ある日の天気に、ふっと過去へ連れ戻されやすい人。その記憶は重いとは限らず、春の道の口笛みたいに軽いこともある。そこに留まるためではなく、自分が確かにそこを通ってきたと知るために、そっとしまっておく。", ["記憶", "昔の日々", "そっとしまう"]], "en": ["The one who gently keeps old days", "You are not simply lost in nostalgia; old songs, old cities, and certain weather can easily carry you back. Those memories are not always heavy; they can be light, like whistling on a spring road. You keep them not to stay in the past, but to know that you truly passed through it.", ["memory", "old days", "gentle keeping"]]}, {"id": "muda", "artist": "SAKEROCK", "song": "MUDA", "scores": {"life": 2, "forward": 3, "solitude": 2, "humor": 5, "body": 4, "light": 3, "chaos": 5, "memory": 1, "intimacy": 1, "rebuild": 3}, "zh": ["会认真做无用功的人", "你不想每件事都只看效率。绕路、试错、做看起来没必要的事，反而能让你保持手感和自由度。有些无用，正好让人活过来。", ["无用", "试错", "自由度"]], "ja": ["無駄を本気でやれる人", "すべてを効率だけで見たくない人。遠回り、試行錯誤、一見必要のないことが、むしろ感覚や自由度を保ってくれる。無駄だからこそ、人を生き返らせることもある。", ["無駄", "試行錯誤", "自由度"]], "en": ["The one who takes useless work seriously", "You do not want to judge everything only by efficiency. Detours, trial and error, and seemingly unnecessary things help you keep your feel and freedom. Some useless things are exactly what make you feel alive again.", ["useless", "trial and error", "freedom"]]}, {"id": "sayonara", "artist": "SAKEROCK", "song": "SAYONARA", "scores": {"life": 3, "forward": 3, "solitude": 5, "humor": 1, "body": 2, "light": 3, "chaos": 1, "memory": 5, "intimacy": 3, "rebuild": 4}, "zh": ["告别后还会整理的人", "你不太能轻松说完再见就走。结束之后，你需要一点时间收拾情绪、保存重要的部分，然后再回到自己的生活里。你不是不往前，只是会认真告别。", ["告别", "整理", "继续生活"]], "ja": ["別れのあとに整理する人", "軽くさよならを言って、そのまま進めるタイプではない。終わったあとに少し時間をかけて気持ちを整理し、大事な部分を残してから、自分の生活へ戻っていく。進まないのではなく、丁寧に別れる人。", ["別れ", "整理", "生活に戻る"]], "en": ["The one who sorts things out after goodbye", "You are not the type to say goodbye lightly and simply walk away. After something ends, you need time to sort your feelings, keep what mattered, and return to your own life. You do move on; you just say goodbye carefully.", ["goodbye", "sorting out", "returning to life"]]}];

    const app = document.getElementById("app");

    const actions = document.getElementById("actions");

    let started = false;

    let copiedTimer = null;
    const keys = ["life", "forward", "solitude", "humor", "body", "light", "chaos", "memory", "intimacy", "rebuild"];

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[s]));
    }

    function addScores(base, add) {
      const next = { ...base };
      Object.entries(add || {}).forEach(([key, value]) => next[key] = (next[key] || 0) + value);
      return next;
    }

    function getUserScores() {
      return answers.reduce((acc, score) => addScores(acc, score), {});
    }

    function distance(userScores, resultScores) {
      return keys.reduce((sum, key) => sum + Math.abs((userScores[key] || 0) - (resultScores[key] || 0) * 3.25), 0);
    }

    function getFinalResult() {
      const userScores = getUserScores();
      return [...results].map(r => ({ ...r, d: distance(userScores, r.scores) })).sort((a, b) => a.d - b.d)[0];
    }

    function reset() {
      started = false;
      index = 0;
      answers = [];
      render();

    function backToLanguage() {
      language = null;
      started = false;
      index = 0;
      answers = [];
      render();
    }

    function renderActions() {
      const t = language ? ui[language] : ui.zh;
      actions.innerHTML = "";

        langBtn.className = "pill-btn";
        langBtn.textContent = "🌐 " + (languages.find(lang => lang.key === language)?.label || t.changeLanguage);
        langBtn.onclick = backToLanguage;
        actions.appendChild(langBtn);
      }
      if (language && (started || answers.length > 0)) {
        const resetBtn = document.createElement("button");
        resetBtn.className = "pill-btn";
        resetBtn.textContent = "↻ " + t.reset;
        resetBtn.onclick = reset;
        actions.appendChild(resetBtn);
      }
    }

    function renderLanguage() {
      const t = ui.zh;
      headerTitle.textContent = t.headerTitle;
      app.innerHTML = `
        <section class="card language-card">
          <div class="grid3">
            ${languages.map(lang => `
              <button class="lang-btn" data-lang="${lang.key}">

                <span class="lang-label">${escapeHtml(lang.label)}</span>
              </button>
            `).join("")}
          </div>
        </section>
      `;
      document.querySelectorAll("[data-lang]").forEach(btn => {
        btn.onclick = () => {

          index = 0;
          answers = [];
          render();
        };

        index -= 1;

      `;
      document.querySelectorAll("[data-option]").forEach(btn => {
        btn.onclick = () => {
          const option = q.options.find(o => o.key === btn.dataset.option);
          answers.push(option.scores);
          if (index < questions.length - 1) index += 1;
          else index = questions.length;
          render();
        };
      });
      const prevBtn = document.getElementById("prevQuestionBtn");
      if (prevBtn) prevBtn.onclick = goBackQuestion;

    async function copyResult(text, btn) {
